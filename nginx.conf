server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # ── HTML (rutas limpias): no-cache, para que los cambios se vean enseguida ──
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://*.basemaps.cartocdn.com; connect-src 'self' https://api.techcam.com.ar https://cloudflareinsights.com; form-action https://api.techcam.com.ar; base-uri 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── JS / CSS: revalidar siempre (no tienen fingerprint en el nombre) ──
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://*.basemaps.cartocdn.com; connect-src 'self' https://api.techcam.com.ar https://cloudflareinsights.com; form-action https://api.techcam.com.ar; base-uri 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ── Fuentes / imágenes / audio: cache largo (rara vez cambian) ──
    # Cache-Control SIN "always": así solo se manda en respuestas exitosas.
    # Un 404 de un asset inexistente NO debe llevar max-age=604800, o Cloudflare
    # cachea el 404 por 7 días (negative cache). Los headers de seguridad sí van
    # con "always" porque deben aplicar también a las páginas de error.
    location ~* \.(woff2|png|jpe?g|svg|webp|mp3|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://*.basemaps.cartocdn.com; connect-src 'self' https://api.techcam.com.ar https://cloudflareinsights.com; form-action https://api.techcam.com.ar; base-uri 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
