server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # Cabeceras de seguridad
    # CSP: solo assets propios + connect/form al backend de leads. Sin unsafe-inline en scripts.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://*.basemaps.cartocdn.com; connect-src 'self' https://api.techcam.com.ar https://cloudflareinsights.com; form-action https://api.techcam.com.ar; base-uri 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache de estáticos (add_header en location reemplaza los del server: hay que repetirlos)
    location ~* \.(css|js|woff2|png|jpe?g|svg|webp|mp3)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://*.basemaps.cartocdn.com; connect-src 'self' https://api.techcam.com.ar https://cloudflareinsights.com; form-action https://api.techcam.com.ar; base-uri 'none'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
